[flake8]
ignore = N802,W503,E402
max-line-length = 160
exclude = migrations,.ropeproject,static,_static,build

[isort]
combine_as_imports = true
default_section = THIRDPARTY
include_trailing_comma = true
known_third_party = pretix
multi_line_output = 5
not_skip = __init__.py
skip = setup.py

[tool:pytest]
DJANGO_SETTINGS_MODULE = pretix.settings
python_files = test_*.py
testpaths = pretix_guestlist/tests

[check-manifest]
ignore =
    .update-locales
    pretixplugin.toml
    Makefile
    tests/*
    docker-dev-setup/*
    CLAUDE.md
    PHASE*.md
    STARTER-PROMPT.md
    TICKET-LIMIT-FIX-PROMPT.md
    task_plan.md
    progress.md
    findings.md
